<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geschützte Seite</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#161a2b;color:#eef0f7;}
  #lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.2rem;}
  .box{background:#1f2440;border:1px solid #323a5c;border-radius:10px;padding:2rem;max-width:340px;width:100%;text-align:center;}
  .seal{width:48px;height:48px;border-radius:50%;margin:0 auto 1rem;background:radial-gradient(circle at 35% 30%, #e6c65a, #c9a227 60%, #7a611b 100%);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
  input{width:100%;padding:.75rem;border-radius:6px;border:1px solid #323a5c;background:#161a2b;color:#eef0f7;font-size:1rem;margin:1rem 0 .6rem;box-sizing:border-box;}
  button{width:100%;padding:.8rem;border:none;border-radius:6px;background:#c9a227;color:#20200a;font-weight:700;font-size:1rem;cursor:pointer;}
  button:hover{background:#e6c65a;}
  .err{color:#ff8080;font-size:.85rem;min-height:1.2em;margin-top:.6rem;}
</style>
</head>
<body>
<div id="lock">
  <div class="box">
    <div class="seal">🔒</div>
    <p>Diese Seite ist passwortgeschützt.</p>
    <input type="password" id="pw" placeholder="Passwort" autofocus>
    <button id="go">Entsperren</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
const saltB64 = "VGhltzLxQp+27nrg43UtTg==";
const ivB64 = "HKZjSA3yIBci9CJx";
const cipherB64 = "/8roC7Q0trhxs9o7YRPyTMZX+5rvUK4SECcYm8mevINJH8Ra9wSHAz2JdvQERCCdlm8pKt2Yg2OjVXPD0fFtASb8goJ1u4iOxfwpvR2c5HjWlSwaGpz7pO1Cd8jH632voCZGkVn58jjYE5BZs+6ysbV/9Ti9oNTQ/89MZgul4PaQ/+F3a59Kgz3ddKfr6iTbLngGXbhfSDsnXLwa/muNEK3y/Xv52Y7/Kk+DBCF/vN1m2cI6Bo/DoNbX3i6JkSkYCNO4Ytw7PTPTrMiEX7moaohtp4F5p5muoIu1BZ12E2BkkFDvhZHcbnSB+pnaA2BChJH2LNwWInBVeFs7X50l66TkiNWVauMZCF0pioBXWdXiJzS6YWEVmaY2";

function fromB64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryUnlock() {
  const pw = document.getElementById("pw").value;
  const errEl = document.getElementById("err");
  errEl.textContent = "";
  try {
    const salt = fromB64(saltB64);
    const iv = fromB64(ivB64);
    const cipher = fromB64(cipherB64);
    const key = await deriveKey(pw, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
    const html = new TextDecoder().decode(plainBuf);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.textContent = "Falsches Passwort.";
  }
}

document.getElementById("go").addEventListener("click", tryUnlock);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
</script>
</body>
</html>
